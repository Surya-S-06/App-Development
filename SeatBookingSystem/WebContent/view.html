<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View all confirmed seat reservations in the SeatBook Booking System.">
    <title>View Bookings | SeatBook</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ── Navigation Bar ──────────────────────────── -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <div class="brand-icon">🎫</div>
            <span class="brand-name">SeatBook</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="view.html" class="active">📋 View Bookings</a></li>
            <li><a href="admin.html">⚙️ Admin</a></li>
        </ul>
    </nav>

    <!-- ── Page Content ─────────────────────────────── -->
    <div class="page-wrap">

        <div class="page-header">
            <h1 class="page-title">All Bookings</h1>
            <p class="page-subtitle">List of all confirmed seat reservations</p>
        </div>

        <div class="card">
            <!-- Table header bar -->
            <div class="tbl-header">
                <div class="card-title" style="margin-bottom:0;">
                    📋 Booking Records
                    <span class="count-badge" id="count-badge">loading…</span>
                </div>
                <button class="btn btn-ghost" onclick="loadBookings()">🔄 Refresh</button>
            </div>

            <!-- Loading indicator -->
            <div class="loading-box" id="loading">
                <div class="spinner"></div> Loading bookings…
            </div>

            <!-- Data table (hidden until data loads) -->
            <div class="tbl-wrap" id="tbl-wrap" style="display:none;">
                <table class="data-tbl">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Seat No.</th>
                            <th>Passenger Name</th>
                            <th>Booking Time</th>
                        </tr>
                    </thead>
                    <tbody id="view-tbody"></tbody>
                </table>
            </div>

            <!-- Empty state -->
            <div class="empty-box" id="empty-box" style="display:none;">
                <div class="e-icon">📭</div>
                <p>No bookings yet. <a href="index.html" style="color:var(--accent);">Book a seat!</a></p>
            </div>
        </div>

    </div>

    <script src="js/view.js"></script>
</body>

</html>
